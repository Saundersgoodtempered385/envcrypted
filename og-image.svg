<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080c0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1a10;stop-opacity:1" />
    </linearGradient>

    <!-- Green glow -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0" />
    </radialGradient>

    <!-- Left accent glow -->
    <radialGradient id="leftGlow" cx="0%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0" />
    </radialGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#00ff88" stroke-width="0.4" stroke-opacity="0.08"/>
    </pattern>

    <!-- Noise filter -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Scanlines -->
    <pattern id="scanlines" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="2" fill="rgba(0,0,0,0.06)"/>
    </pattern>

    <!-- Clip for rounded corners -->
    <clipPath id="rounded">
      <rect width="1200" height="630" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow orbs -->
  <ellipse cx="600" cy="315" rx="500" ry="400" fill="url(#glowGrad)"/>
  <ellipse cx="0" cy="315" rx="400" ry="400" fill="url(#leftGlow)"/>

  <!-- Scanlines overlay -->
  <rect width="1200" height="630" fill="url(#scanlines)" opacity="0.5"/>

  <!-- Left decorative border line -->
  <line x1="80" y1="60" x2="80" y2="570" stroke="#00ff88" stroke-width="1" stroke-opacity="0.15"/>

  <!-- Top decorative line -->
  <line x1="80" y1="60" x2="1120" y2="60" stroke="#00ff88" stroke-width="1" stroke-opacity="0.1"/>

  <!-- Bottom decorative line -->
  <line x1="80" y1="570" x2="1120" y2="570" stroke="#00ff88" stroke-width="1" stroke-opacity="0.1"/>

  <!-- Right decorative border line -->
  <line x1="1120" y1="60" x2="1120" y2="570" stroke="#00ff88" stroke-width="1" stroke-opacity="0.15"/>

  <!-- Corner accents - top left -->
  <rect x="80" y="60" width="20" height="3" fill="#00ff88" opacity="0.6"/>
  <rect x="80" y="60" width="3" height="20" fill="#00ff88" opacity="0.6"/>

  <!-- Corner accents - top right -->
  <rect x="1100" y="60" width="20" height="3" fill="#00ff88" opacity="0.6"/>
  <rect x="1117" y="60" width="3" height="20" fill="#00ff88" opacity="0.6"/>

  <!-- Corner accents - bottom left -->
  <rect x="80" y="567" width="20" height="3" fill="#00ff88" opacity="0.6"/>
  <rect x="80" y="550" width="3" height="20" fill="#00ff88" opacity="0.6"/>

  <!-- Corner accents - bottom right -->
  <rect x="1100" y="567" width="20" height="3" fill="#00ff88" opacity="0.6"/>
  <rect x="1117" y="550" width="3" height="20" fill="#00ff88" opacity="0.6"/>

  <!-- Version badge -->
  <rect x="110" y="90" width="130" height="28" rx="14" fill="#111a14" stroke="#1a2e1a" stroke-width="1"/>
  <circle cx="127" cy="104" r="4" fill="#00ff88"/>
  <text x="138" y="109" font-family="monospace" font-size="12" fill="#00ff88" letter-spacing="1">v1.0.4 STABLE</text>

  <!-- Lock icon area - decorative -->
  <g transform="translate(110, 145)">
    <!-- Lock body -->
    <rect x="0" y="18" width="48" height="36" rx="6" fill="none" stroke="#00ff88" stroke-width="2" stroke-opacity="0.4"/>
    <!-- Lock shackle -->
    <path d="M 10 18 L 10 10 Q 10 0 24 0 Q 38 0 38 10 L 38 18" fill="none" stroke="#00ff88" stroke-width="2" stroke-opacity="0.4"/>
    <!-- Keyhole -->
    <circle cx="24" cy="33" r="5" fill="#00ff88" fill-opacity="0.3"/>
    <rect x="21" y="33" width="6" height="8" rx="1" fill="#00ff88" fill-opacity="0.3"/>
  </g>

  <!-- Main title: envcrypted -->
  <text x="110" y="285" font-family="'Courier New', monospace" font-size="88" font-weight="900" letter-spacing="-3" fill="#c8d8c8">env</text>
  <text x="340" y="285" font-family="'Courier New', monospace" font-size="88" font-weight="900" letter-spacing="-3" fill="#00ff88">crypted</text>

  <!-- Lock emoji substitute -->
  <text x="790" y="285" font-size="80">🔐</text>

  <!-- Tagline -->
  <text x="110" y="340" font-family="monospace" font-size="20" fill="#6a8a6a" letter-spacing="0.5">Stop sharing .env files over WhatsApp.</text>

  <!-- Divider line -->
  <line x1="110" y1="370" x2="600" y2="370" stroke="#1a2e1a" stroke-width="1"/>

  <!-- Feature pills -->
  <!-- Pill 1 -->
  <rect x="110" y="390" width="168" height="36" rx="18" fill="#111a14" stroke="#1a2e1a" stroke-width="1"/>
  <text x="130" y="413" font-family="monospace" font-size="13" fill="#00ff88">🔒</text>
  <text x="152" y="413" font-family="monospace" font-size="13" fill="#c8d8c8" letter-spacing="0.3">AES-256-GCM</text>

  <!-- Pill 2 -->
  <rect x="292" y="390" width="148" height="36" rx="18" fill="#111a14" stroke="#1a2e1a" stroke-width="1"/>
  <text x="312" y="413" font-family="monospace" font-size="13" fill="#00ff88">🚫</text>
  <text x="334" y="413" font-family="monospace" font-size="13" fill="#c8d8c8" letter-spacing="0.3">No Account</text>

  <!-- Pill 3 -->
  <rect x="454" y="390" width="148" height="36" rx="18" fill="#111a14" stroke="#1a2e1a" stroke-width="1"/>
  <text x="474" y="413" font-family="monospace" font-size="13" fill="#00ff88">⚡</text>
  <text x="496" y="413" font-family="monospace" font-size="13" fill="#c8d8c8" letter-spacing="0.3">No Server</text>

  <!-- Pill 4 -->
  <rect x="616" y="390" width="130" height="36" rx="18" fill="#111a14" stroke="#1a2e1a" stroke-width="1"/>
  <text x="636" y="413" font-family="monospace" font-size="13" fill="#00ff88">✅</text>
  <text x="658" y="413" font-family="monospace" font-size="13" fill="#c8d8c8" letter-spacing="0.3">MIT Free</text>

  <!-- Install command box -->
  <rect x="110" y="450" width="500" height="56" rx="8" fill="#0d1210" stroke="#1a2e1a" stroke-width="1"/>
  <!-- Green top border on box -->
  <rect x="110" y="450" width="500" height="2" rx="1" fill="#00ff88" opacity="0.4"/>
  <text x="130" y="482" font-family="monospace" font-size="16" fill="#6a8a6a">$</text>
  <text x="148" y="482" font-family="monospace" font-size="16" fill="#c8d8c8" letter-spacing="0.3">npm install envcrypted</text>

  <!-- Right side: terminal mockup -->
  <rect x="730" y="130" width="370" height="380" rx="12" fill="#0a0f0a" stroke="#1a2e1a" stroke-width="1"/>

  <!-- Terminal header -->
  <rect x="730" y="130" width="370" height="40" rx="12" fill="#111a14"/>
  <rect x="730" y="155" width="370" height="15" fill="#111a14"/>
  <circle cx="758" cy="150" r="6" fill="#ff5f57"/>
  <circle cx="778" cy="150" r="6" fill="#ffbd2e"/>
  <circle cx="798" cy="150" r="6" fill="#28c840"/>
  <text x="818" y="155" font-family="monospace" font-size="11" fill="#6a8a6a">~/project — envcrypted</text>

  <!-- Terminal content -->
  <text x="752" y="198" font-family="monospace" font-size="12" fill="#6a8a6a">$</text>
  <text x="768" y="198" font-family="monospace" font-size="12" fill="#00ff88">npx envcrypted audit</text>

  <text x="752" y="228" font-family="monospace" font-size="11" fill="#6a8a6a">  Scanning .env...</text>

  <text x="752" y="258" font-family="monospace" font-size="11" fill="#ff4757">  ✖ DB_PASSWORD=1234</text>
  <text x="752" y="276" font-family="monospace" font-size="11" fill="#ff4757">  ✖ API_KEY=your-key-here</text>
  <text x="752" y="294" font-family="monospace" font-size="11" fill="#ffd32a">  ⚠ localhost in production</text>

  <text x="752" y="324" font-family="monospace" font-size="12" fill="#6a8a6a">$</text>
  <text x="768" y="324" font-family="monospace" font-size="12" fill="#00ff88">npx envcrypted push</text>

  <text x="752" y="354" font-family="monospace" font-size="11" fill="#6a8a6a">  Encrypting .env...</text>

  <text x="752" y="384" font-family="monospace" font-size="11" fill="#00ff88">  ✔ Vault saved as .env.vault</text>

  <text x="752" y="414" font-family="monospace" font-size="12" fill="#6a8a6a">$</text>
  <text x="768" y="414" font-family="monospace" font-size="12" fill="#00ff88">npx envcrypted pull</text>

  <text x="752" y="444" font-family="monospace" font-size="11" fill="#00ff88">  ✔ .env restored!</text>

  <!-- Cursor blink -->
  <rect x="752" y="458" width="8" height="14" fill="#00ff88" opacity="0.8"/>

  <!-- Bottom: built by -->
  <text x="110" y="548" font-family="monospace" font-size="13" fill="#4a6a4a">Built by</text>
  <text x="168" y="548" font-family="monospace" font-size="13" fill="#6a8a6a">Mohammad Shoeb Faizan</text>
  <text x="380" y="548" font-family="monospace" font-size="13" fill="#4a6a4a">·</text>
  <text x="394" y="548" font-family="monospace" font-size="13" fill="#4a6a4a">npmjs.com/package/envcrypted</text>
</svg>
