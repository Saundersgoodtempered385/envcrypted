<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080c0a"/>
      <stop offset="100%" style="stop-color:#0d1a10"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>

  <!-- Border -->
  <rect width="32" height="32" rx="6" fill="none" stroke="#00ff88" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Lock shackle -->
  <path d="M 10 14 L 10 9 Q 10 4 16 4 Q 22 4 22 9 L 22 14" fill="none" stroke="#00ff88" stroke-width="2" stroke-linecap="round"/>

  <!-- Lock body -->
  <rect x="7" y="14" width="18" height="14" rx="3" fill="#00ff88" fill-opacity="0.15" stroke="#00ff88" stroke-width="1.5"/>

  <!-- Keyhole dot -->
  <circle cx="16" cy="20" r="2.5" fill="#00ff88"/>

  <!-- Keyhole slot -->
  <rect x="14.5" y="20" width="3" height="4" rx="1" fill="#00ff88"/>
</svg>
