    .terminal-header { padding: 12px 16px; background: var(--bg3); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }

    .dot.r { background: #ff5f57; } .dot.y { background: #ffbd2e; } .dot.g { background: #28c840; }
    .terminal-path { margin-left: 12px; font-size: 12px; color: var(--text2); letter-spacing: 0.3px; }

    .terminal-body { padding: 28px 32px; min-height: 380px; font-size: 13px; line-height: 1.75; position: relative; }

    .out-bold { font-weight: 700; }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    .indent { padding-left: 20px; }
    .controls { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-top: 1px solid var(--border); background: var(--bg3); }
    .control-btns { display: flex; gap: 8px; }
    .ctrl-btn { background: var(--bg); border: 1px solid var(--border); color: var(--text2); padding: 8px 16px; border-radius: 4px; font-size: 11px; font-family: 'JetBrains Mono', monospace; cursor: pointer; letter-spacing: 0.5px; transition: all 0.2s; }

  let currentStep = 0, currentLineIdx = 0, isPlaying = true, timer = null;
  const termBody = document.getElementById('termBody');

  function renderLine(line) {
    const div = document.createElement('div');
    div.className = 'line';
    if (line.type === 'blank') { div.innerHTML = '&nbsp;'; div.style.lineHeight = '0.5'; termBody.appendChild(div); return; }
    if (line.type === 'cmd') {
      div.innerHTML = `<span class="prompt-sym">$</span><span class="cmd">${line.text}</span>`;
    } else {
      if (line.extra) {
        div.innerHTML = `<span class="${line.cls}">${line.text}</span><span class="${line.extra.cls}">${line.extra.text}</span>`;
      } else {
        div.innerHTML = `<span class="${line.cls}">${line.text}</span>`;
      }
      div.className = 'line indent';
    }
    termBody.appendChild(div);
    termBody.scrollTop = termBody.scrollHeight;
  }

  function addCursor() { removeCursor(); const cur = document.createElement('span'); cur.className = 'cursor-blink'; cur.id = 'activeCursor'; termBody.appendChild(cur); }
  function removeCursor() { const old = document.getElementById('activeCursor'); if (old) old.remove(); }
  function updateTabs() { document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === currentStep)); }
  function updateDots() {
    document.querySelectorAll('.step-dot').forEach((d, i) => { d.classList.remove('active', 'done'); if (i === currentStep) d.classList.add('active'); else if (i < currentStep) d.classList.add('done'); });
    document.querySelectorAll('.step-label-item').forEach((l, i) => { l.classList.remove('active'); if (i === currentStep) l.classList.add('active'); });
  }
  function updateStepLabel() { document.getElementById('stepLabel').textContent = `Step ${currentStep + 1} of 8 — ${STEPS[currentStep].label}`; }

  function playNextLine() {
    if (!isPlaying) return;
    const step = STEPS[currentStep];
    if (currentLineIdx >= step.lines.length) {
      removeCursor();
      if (currentStep < STEPS.length - 1) {
        timer = setTimeout(() => { currentStep++; currentLineIdx = 0; termBody.innerHTML = ''; updateTabs(); updateDots(); updateStepLabel(); addCursor(); playNextLine(); }, 2200);
      } else {
        timer = setTimeout(() => restartDemo(), 3000);
      }
      return;
    }
    const line = step.lines[currentLineIdx];
    removeCursor(); renderLine(line); addCursor();
    currentLineIdx++;
    timer = setTimeout(playNextLine, line.delay + 180);
  }

  function togglePlay() {
    isPlaying = !isPlaying;
    const btn = document.getElementById('playBtn');
    if (isPlaying) { btn.textContent = '⏸ PAUSE'; btn.classList.add('active'); playNextLine(); }
    else { btn.textContent = '▶ PLAY'; btn.classList.remove('active'); clearTimeout(timer); }
  }

  function restartDemo() {
    clearTimeout(timer); currentStep = 0; currentLineIdx = 0; termBody.innerHTML = '';
    isPlaying = true;
    document.getElementById('playBtn').textContent = '⏸ PAUSE';
    document.getElementById('playBtn').classList.add('active');
    updateTabs(); updateDots(); updateStepLabel(); addCursor(); playNextLine();
  }

  function jumpToStep(idx) {
    clearTimeout(timer); currentStep = idx; currentLineIdx = 0; termBody.innerHTML = '';
    isPlaying = true;
    document.getElementById('playBtn').textContent = '⏸ PAUSE';
    document.getElementById('playBtn').classList.add('active');
    updateTabs(); updateDots(); updateStepLabel(); addCursor(); playNextLine();
  }

  addCursor();
  playNextLine();
</script>
</body>
</html>
